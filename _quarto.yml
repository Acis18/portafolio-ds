project:
  type: website
  output-dir: docs

website:
  title: "Portafolio DS — Angel Acis"
  description: "25 proyectos aplicados con microdatos del INEGI"
  navbar:
    left:
      - href: index.qmd
        text: Inicio
    right:
      - icon: github
        href: https://github.com/Acis18/portafolio-ds

  sidebar:
    style: "docked"
    contents:
      - section: "Configuración"
        contents:
          - practicas/P01_ambiente/P01_ambiente.qmd
      - section: "Mercado laboral"
        contents:
          - practicas/P02_diagnostico/P02_diagnostico_enoe.qmd

format:
  html:
    theme: litera
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    highlight-style: github
    lang: es

execute:
  freeze: auto
  echo: true
  warning: false
  message: false